<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gravação de Áudio</title>
  <meta name="theme-color" content="#0f0f0f">
  <meta name="description" content="Gravação de Áudio">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #0f0f0f;
      --bg-surface: #1a1a1a;
      --bg-elevated: #222222;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.15);
      --text-primary: #f0f0f0;
      --text-secondary: #888;
      --text-muted: #555;
      --accent: #7c5cbf;
      --accent-hover: #9370d8;
      --accent-dim: rgba(124,92,191,0.15);
      --success: #3d9e6e;
      --success-dim: rgba(61,158,110,0.15);
      --danger: #c94f4f;
      --danger-dim: rgba(201,79,79,0.15);
      --muted-bg: #2a2a2a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-base);
      padding: 24px 16px;
    }

    .container { width: 100%; max-width: 420px; }

    .card {
      background: var(--bg-surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 32px 28px;
    }

    .card-header { text-align: center; margin-bottom: 24px; }
    .card-header h1 { font-size: 1.25rem; font-weight: 600; color: var(--text-primary); letter-spacing: -0.02em; }
    .card-header p { font-size: 0.85rem; color: var(--text-secondary); margin-top: 6px; }

    .form-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 11px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      font-size: 0.875rem;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]::placeholder, input[type="password"]::placeholder { color: var(--text-muted); }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 16px;
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, background 0.2s;
      letter-spacing: -0.01em;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn svg { width: 17px; height: 17px; flex-shrink: 0; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 1; background: var(--accent-hover); }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border-hover);
      color: var(--text-primary);
    }
    .btn-outline:hover { background: var(--bg-elevated); opacity: 1; }

    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }

    .btn-muted {
      background: var(--muted-bg);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-muted:hover { background: var(--bg-elevated); opacity: 1; }

    .btn-secondary { background: var(--accent-dim); color: var(--accent-hover); border: 1px solid rgba(124,92,191,0.3); }
    .btn-secondary:hover { background: rgba(124,92,191,0.25); opacity: 1; }

    .btn-sm { width: auto; padding: 8px 14px; font-size: 0.8rem; }

    .actions { display: flex; flex-direction: column; gap: 10px; }

    .recording-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: var(--bg-elevated);
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .recording-info { display: flex; align-items: center; gap: 10px; }
    .rec-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--danger); animation: pulse-rec 1s ease-in-out infinite; }
    @keyframes pulse-rec { 0%,100%{opacity:1} 50%{opacity:0.25} }
    .timer { font-size: 1.75rem; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--text-primary); letter-spacing: -0.03em; }
    .recording-btns { display: flex; gap: 8px; }

    .player-wrap {
      background: var(--bg-elevated);
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 12px;
      margin-bottom: 16px;
    }
    .player-wrap audio { width: 100%; height: 40px; }

    .feedback { text-align: center; font-size: 0.85rem; font-weight: 500; margin-top: 14px; padding: 10px 14px; border-radius: 8px; }
    .feedback.success { color: var(--success); background: var(--success-dim); }
    .feedback.error { color: var(--danger); background: var(--danger-dim); }

    .footer { text-align: center; font-size: 0.75rem; color: var(--text-muted); margin-top: 20px; }
    .footer span { font-weight: 600; color: var(--accent-hover); }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 50;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal-box {
      background: var(--bg-surface);
      border: 1px solid var(--border-hover);
      border-radius: 14px;
      padding: 28px 24px;
      max-width: 340px;
      width: 90%;
      text-align: center;
    }
    .modal-box h2 { font-size: 1rem; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
    .modal-box p { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 24px; }
    .modal-btns { display: flex; gap: 8px; justify-content: center; }

    .login-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; text-align: left; }
    .login-error { color: var(--danger); font-size: 0.8rem; text-align: center; margin-bottom: 8px; padding: 8px; background: var(--danger-dim); border-radius: 8px; }

    .spinner { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="card-header">
      <h1>Gravação de Áudio</h1>
      <p>Preencha os dados e envie seu áudio</p>
    </div>

    <div class="form-group">
      <input type="text" id="nome" placeholder="Nome completo *">
      <input type="text" id="cpf" placeholder="CPF *" maxlength="14">
      <input type="text" id="telefone" placeholder="Telefone *" maxlength="15">
    </div>

    <div id="errorMsg" class="feedback error hidden"></div>

    <div id="recordingArea" class="recording-area hidden">
      <div class="recording-info">
        <span id="recDot" class="rec-dot"></span>
        <span id="timer" class="timer">00:00</span>
      </div>
      <div class="recording-btns">
        <button id="btnPause" class="btn btn-muted btn-sm" onclick="pauseRecording()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          Pausar
        </button>
        <button id="btnResume" class="btn btn-muted btn-sm hidden" onclick="resumeRecording()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg>
          Retomar
        </button>
        <button class="btn btn-danger btn-sm" onclick="requestStop()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
          Finalizar
        </button>
      </div>
    </div>

    <div id="playerWrap" class="player-wrap hidden">
      <audio id="audioPlayer" controls></audio>
    </div>

    <div class="actions">
      <button id="btnRecord" class="btn btn-primary" onclick="startRecording()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
        Gravar Áudio
      </button>
      <button id="btnUpload" class="btn btn-outline" onclick="document.getElementById('fileInput').click()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
        Upload de Áudio
      </button>
      <input type="file" id="fileInput" accept=".mp3,.m4a,.wav,.ogg,.webm,.aac,.caf" class="hidden" onchange="handleUpload(event)">
      <button id="btnProcess" class="btn btn-success hidden" onclick="processAudio()">
        <svg id="sendIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></svg>
        <svg id="loadingIcon" class="spinner hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        <span id="processLabel">Processar Áudio</span>
      </button>

      <div class="divider"></div>

      <button class="btn btn-secondary" onclick="openLoginModal()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Acessar Avaliações
      </button>
    </div>

    <div id="feedback" class="feedback hidden"></div>
  </div>

  <p class="footer">Powered by <span>Caio</span></p>
</div>

<!-- Modal Finalizar -->
<div id="modal" class="modal-overlay">
  <div class="modal-box">
    <h2>Finalizar gravação</h2>
    <p>Deseja realmente encerrar a gravação?</p>
    <div class="modal-btns">
      <button class="btn btn-outline btn-sm" onclick="closeModal()">Não</button>
      <button class="btn btn-danger btn-sm" onclick="confirmStop()">Sim, finalizar</button>
    </div>
  </div>
</div>

<!-- Modal Login -->
<div id="loginModal" class="modal-overlay">
  <div class="modal-box">
    <h2>Acessar Avaliações</h2>
    <p>Digite suas credenciais para continuar</p>
    <div id="loginError" class="login-error hidden"></div>
    <div class="login-form">
      <input type="text" id="loginUser" placeholder="Usuário">
      <input type="password" id="loginPass" placeholder="Senha">
    </div>
    <div class="modal-btns">
      <button class="btn btn-outline btn-sm" onclick="closeLoginModal()">Cancelar</button>
      <button class="btn btn-primary btn-sm" onclick="doLogin()">Entrar</button>
    </div>
  </div>
</div>

<script>
const WEBHOOK_URL = 'http://187.127.0.97:5678/webhook/transcricaoaudio';
const MAX_FILE_SIZE = 20 * 1024 * 1024;

let mediaRecorder = null;
let audioChunks = [];
let audioBlob = null;
let audioFileName = 'gravacao.webm';
let recordingMimeType = 'audio/webm';
let timerInterval = null;
let elapsed = 0;
let state = 'idle';

function openLoginModal() {
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginError').classList.add('hidden');
  document.getElementById('loginModal').classList.add('open');
}

function closeLoginModal() {
  document.getElementById('loginModal').classList.remove('open');
}

function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  if (user === 'admin' && pass === '123') {
    window.location.href = 'https://site.iquest.com.br/projetoakali/analise.php';
  } else {
    const err = document.getElementById('loginError');
    err.textContent = 'Usuário ou senha incorretos.';
    err.classList.remove('hidden');
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('loginModal').classList.contains('open')) {
    doLogin();
  }
});

document.getElementById('cpf').addEventListener('input', function() {
  let v = this.value.replace(/\D/g, '').slice(0, 11);
  if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
  else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
  else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
  this.value = v;
});

document.getElementById('telefone').addEventListener('input', function() {
  let v = this.value.replace(/\D/g, '').slice(0, 11);
  if (v.length > 6) v = v.replace(/(\d{2})(\d{5})(\d{1,4})/, '($1) $2-$3');
  else if (v.length > 2) v = v.replace(/(\d{2})(\d{1,5})/, '($1) $2');
  else if (v.length > 0) v = v.replace(/(\d{1,2})/, '($1');
  this.value = v;
});

function formatTime(s) {
  const m = String(Math.floor(s / 60)).padStart(2, '0');
  const sec = String(s % 60).padStart(2, '0');
  return `${m}:${sec}`;
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.remove('hidden');
}
function hideError() { document.getElementById('errorMsg').classList.add('hidden'); }

function updateUI() {
  const isActive = state === 'recording' || state === 'paused';
  document.getElementById('recordingArea').classList.toggle('hidden', !isActive);
  document.getElementById('btnRecord').classList.toggle('hidden', isActive);
  document.getElementById('btnUpload').classList.toggle('hidden', isActive);
  document.getElementById('btnPause').classList.toggle('hidden', state !== 'recording');
  document.getElementById('btnResume').classList.toggle('hidden', state !== 'paused');
  document.getElementById('recDot').style.animationPlayState = state === 'paused' ? 'paused' : 'running';
  document.getElementById('btnProcess').classList.toggle('hidden', !audioBlob || isActive);
}

function startTimer() {
  timerInterval = setInterval(() => {
    elapsed++;
    document.getElementById('timer').textContent = formatTime(elapsed);
  }, 1000);
}
function stopTimer() { clearInterval(timerInterval); }

function getSupportedMimeType() {
  const types = [
    'audio/webm;codecs=opus',
    'audio/webm',
    'audio/mp4',
    'audio/aac',
    'audio/ogg;codecs=opus',
    ''
  ];
  for (const t of types) {
    if (t === '') return { mimeType: '', ext: 'wav' };
    try {
      if (MediaRecorder.isTypeSupported(t)) return { mimeType: t, ext: t.includes('mp4') || t.includes('aac') ? 'm4a' : t.includes('ogg') ? 'ogg' : 'webm' };
    } catch(e) {}
  }
  return { mimeType: '', ext: 'wav' };
}

async function startRecording() {
  hideError();
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    audioBlob = null;
    elapsed = 0;
    document.getElementById('timer').textContent = '00:00';
    document.getElementById('playerWrap').classList.add('hidden');

    const { mimeType, ext } = getSupportedMimeType();
    recordingMimeType = mimeType;
    audioFileName = 'gravacao.' + ext;

    const options = mimeType ? { mimeType } : {};
    mediaRecorder = new MediaRecorder(stream, options);

    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      const blobType = recordingMimeType || 'audio/wav';
      audioBlob = new Blob(audioChunks, { type: blobType });
      const url = URL.createObjectURL(audioBlob);
      document.getElementById('audioPlayer').src = url;
      document.getElementById('playerWrap').classList.remove('hidden');
      state = 'finished';
      updateUI();
    };

    mediaRecorder.start(1000);
    state = 'recording';
    startTimer();
    updateUI();
  } catch (err) {
    showError('Não foi possível acessar o microfone. Verifique as permissões.');
  }
}

function pauseRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.pause();
    state = 'paused';
    stopTimer();
    updateUI();
  }
}

function resumeRecording() {
  if (mediaRecorder && mediaRecorder.state === 'paused') {
    mediaRecorder.resume();
    state = 'recording';
    startTimer();
    updateUI();
  }
}

function requestStop() {
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function confirmStop() {
  closeModal();
  stopTimer();
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
}

function handleUpload(e) {
  hideError();
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > MAX_FILE_SIZE) { showError('Arquivo muito grande. Máximo: 20MB.'); return; }

  audioBlob = file;
  audioFileName = file.name;
  const url = URL.createObjectURL(file);
  document.getElementById('audioPlayer').src = url;
  document.getElementById('playerWrap').classList.remove('hidden');
  state = 'finished';
  updateUI();
  e.target.value = '';
}

async function processAudio() {
  hideError();
  const fb = document.getElementById('feedback');
  fb.classList.add('hidden');

  const nome = document.getElementById('nome').value.trim();
  const cpf = document.getElementById('cpf').value;
  const telefone = document.getElementById('telefone').value;

  if (!nome) { showError('Preencha o nome.'); return; }
  if (cpf.replace(/\D/g, '').length !== 11) { showError('CPF inválido.'); return; }
  if (telefone.replace(/\D/g, '').length < 10) { showError('Telefone inválido.'); return; }
  if (!audioBlob) { showError('Grave ou faça upload de um áudio.'); return; }

  const btn = document.getElementById('btnProcess');
  const label = document.getElementById('processLabel');
  const sendIcon = document.getElementById('sendIcon');
  const loadingIcon = document.getElementById('loadingIcon');

  btn.disabled = true;
  label.textContent = 'Enviando...';
  sendIcon.classList.add('hidden');
  loadingIcon.classList.remove('hidden');

  try {
    const fd = new FormData();
    fd.append('nome', nome);
    fd.append('cpf', cpf.replace(/\D/g, ''));
    fd.append('telefone', telefone.replace(/\D/g, ''));
    fd.append('duracao', elapsed);
    fd.append('audio', audioBlob, audioFileName);

    const res = await fetch(WEBHOOK_URL, { method: 'POST', body: fd });
    if (!res.ok) throw new Error('HTTP ' + res.status);

    fb.textContent = 'Áudio enviado com sucesso!';
    fb.className = 'feedback success';
    fb.classList.remove('hidden');
  } catch (err) {
    fb.textContent = 'Erro ao enviar: ' + err.message;
    fb.className = 'feedback error';
    fb.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    label.textContent = 'Processar Áudio';
    sendIcon.classList.remove('hidden');
    loadingIcon.classList.add('hidden');
  }
}
</script>
</body>
</html>
